<!DOCTYPE html>
<html>
<head>
    <title>E-Commerce Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Simple E-Commerce Store</h1>

<div class="products">
    <div class="product">
        <h2>Laptop</h2>
        <p>₹50000</p>
        <button onclick="addToCart('Laptop',50000)">Add to Cart</button>
    </div>

    <div class="product">
        <h2>Headphones</h2>
        <p>₹2000</p>
        <button onclick="addToCart('Headphones',2000)">Add to Cart</button>
    </div>

    <div class="product">
        <h2>Mobile</h2>
        <p>₹15000</p>
        <button onclick="addToCart('Mobile',15000)">Add to Cart</button>
    </div>
</div>

<h2>Shopping Cart</h2>
<ul id="cart"></ul>
<h3 id="total">Total: ₹0</h3>

<script src="script.js"></script>

</body>
</html>
